<html>
<head>
<title>Get a Quote - Precision Tools</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
  background:#f4f6fb;
  font-family:Arial;
}

.container{
  max-width:600px;
  margin-top:60px;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  margin-bottom:20px;
  color:#0a2d6b;
}

.btn-custom{
  background:#e8171d;
  color:white;
  width:100%;
}

.btn-custom:hover{
  background:#c91418;
}
</style>

</head>
<body>

<div class="container">

<h2>Request a Quote</h2>

<form onsubmit="showToast(event)">
  <input type="text" class="form-control mb-3" placeholder="Your Name" required>

  <input type="email" class="form-control mb-3" placeholder="Your Email" required>

  <input type="text" class="form-control mb-3" placeholder="Product / Service Needed" required>

  <textarea class="form-control mb-3" rows="4" placeholder="Your Requirement Details" required></textarea>

  <button class="btn btn-custom" type="submit">Send Request</button>
</form>

</div>

<!-- Toast -->
<div class="toast position-fixed bottom-0 end-0 m-3 text-bg-success" id="toast">
  <div class="d-flex">
    <div class="toast-body">
      ✅ Quote request sent successfully!
    </div>
  </div>
</div>

<script>
function showToast(e){
  e.preventDefault();

  let toast = new bootstrap.Toast(document.getElementById('toast'));
  toast.show();
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
